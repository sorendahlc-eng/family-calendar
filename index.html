<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Family Calendar" />
  <meta name="theme-color" content="#1A1A2E" />
  <title>Family Calendar</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@200;300;400;500;700&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-main:   #1A1A2E;
      --bg-panel:  #16213E;
      --bg-center: #0F0F23;
      --bg-sheet:  #1E1E3A;
      --divider:   #2A2A4A;
      --accent:    #448AFF;
      --accent-15: rgba(68,138,255,.15);
      --accent-30: rgba(68,138,255,.30);
      --accent-50: rgba(68,138,255,.50);
      --white:     rgba(255,255,255,1);
      --white70:   rgba(255,255,255,.70);
      --white60:   rgba(255,255,255,.60);
      --white54:   rgba(255,255,255,.54);
      --white38:   rgba(255,255,255,.38);
      --white24:   rgba(255,255,255,.24);
      --white10:   rgba(255,255,255,.10);
      --white03:   rgba(255,255,255,.03);
      --red:       #FF5252;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-main);
      color: var(--white);
      font-family: 'Roboto', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Utilities ── */
    .hidden { display: none !important; }
    .material-icons { font-size: inherit; vertical-align: middle; }

    /* ── Sign-in screen ── */
    #signin-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-main);
      z-index: 100;
    }
    .signin-card {
      display: flex; flex-direction: column; align-items: center;
      gap: 0;
    }
    .signin-icon {
      font-size: 80px;
      color: var(--accent);
      margin-bottom: 24px;
    }
    .signin-card h1 {
      font-size: 32px; font-weight: 700;
      margin-bottom: 8px;
    }
    .signin-subtitle {
      font-size: 18px; color: var(--white60);
      margin-bottom: 48px;
    }
    .signin-error {
      color: var(--red); font-size: 14px;
      margin-bottom: 16px; text-align: center;
      min-height: 20px;
    }
    #signin-btn {
      width: 280px; height: 52px;
      background: var(--accent); color: var(--white);
      border: none; border-radius: 8px;
      font-size: 18px; font-family: 'Roboto', sans-serif;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: opacity .15s;
    }
    #signin-btn:hover { opacity: .85; }
    #signin-btn:disabled { opacity: .5; cursor: default; }
    #signin-btn .material-icons { font-size: 22px; }

    /* ── Spinner ── */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--white24);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .spinner-sm {
      width: 14px; height: 14px;
      border: 2px solid var(--white24);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Loading overlay (first load) ── */
    #loading-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-main);
      z-index: 50;
    }

    /* ── Dashboard layout ── */
    #dashboard {
      position: fixed; inset: 0;
      display: flex; flex-direction: row;
    }

    /* ── Left panel: upcoming events ── */
    #upcoming-panel {
      width: 300px; flex-shrink: 0;
      background: var(--bg-panel);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .clock-area {
      padding: 16px 8px 12px 16px;
      display: flex; align-items: flex-start; gap: 4px;
    }
    .clock-info { flex: 1; }
    #clock-time {
      font-size: 48px; font-weight: 200; letter-spacing: 2px;
      line-height: 1;
    }
    #clock-date {
      font-size: 14px; color: var(--white60);
      margin-top: 4px;
    }
    .clock-actions {
      display: flex; flex-direction: column; gap: 0;
    }
    .clock-loading {
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 7px;
    }

    .divider {
      height: 1px; background: var(--divider); flex-shrink: 0;
    }

    .events-list {
      flex: 1; overflow-y: auto; padding: 8px 0;
      scrollbar-width: thin; scrollbar-color: var(--white24) transparent;
    }
    .events-list::-webkit-scrollbar { width: 4px; }
    .events-list::-webkit-scrollbar-thumb { background: var(--white24); border-radius: 2px; }

    .day-group { margin-bottom: 2px; }
    .day-label {
      padding: 12px 16px 4px;
      font-size: 13px; font-weight: 700; letter-spacing: .8px;
      color: var(--white60);
    }
    .day-label.today { color: var(--accent); }

    .event-tile {
      display: flex; align-items: center; gap: 10px;
      padding: 3px 12px;
    }
    .event-bar {
      width: 4px; height: 38px; flex-shrink: 0;
      border-radius: 2px;
    }
    .event-info { flex: 1; min-width: 0; }
    .event-title {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .event-time { font-size: 12px; color: var(--white54); }

    /* ── Center panel: month view ── */
    #month-panel {
      flex: 1;
      background: var(--bg-center);
      display: flex; flex-direction: column;
      padding: 16px;
      overflow: hidden;
    }

    .month-header {
      display: flex; align-items: center; gap: 4px;
      margin-bottom: 12px; flex-shrink: 0;
    }
    #month-title {
      flex: 1; text-align: center;
      font-size: 22px; font-weight: 700; letter-spacing: 1px;
    }

    .dow-header {
      display: grid; grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px; flex-shrink: 0;
    }
    .dow-header span {
      text-align: center; font-size: 13px; font-weight: 600;
      color: var(--white38); letter-spacing: .5px;
    }

    .month-grid {
      flex: 1;
      display: flex; flex-direction: column;
      gap: 0; overflow: hidden;
    }
    .month-row {
      flex: 1;
      display: grid; grid-template-columns: repeat(7, 1fr);
    }

    .day-cell {
      margin: 2px;
      border-radius: 6px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 4px;
      transition: background .1s;
      overflow: hidden;
      border: 1px solid transparent;
    }
    .day-cell:hover { background: var(--white10); }
    .day-cell.today {
      background: var(--accent-15);
      border-color: var(--accent-50);
    }
    .day-cell.selected {
      background: var(--accent-30);
      border-color: var(--accent);
    }
    .day-cell.weekend { background: var(--white03); }
    .day-cell.weekend:hover { background: var(--white10); }
    .day-cell.empty { cursor: default; }
    .day-cell.empty:hover { background: transparent; }

    .day-num {
      font-size: 15px; font-weight: 400; color: var(--white70);
      line-height: 1;
    }
    .day-cell.today .day-num { color: var(--accent); font-weight: 700; }
    .day-cell.selected .day-num { color: var(--white); font-weight: 700; }

    .day-dots {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 2px;
      padding: 2px 4px;
      max-width: 100%;
    }
    .event-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .event-overflow {
      font-size: 9px; color: var(--white38);
      align-self: center;
    }

    .calendar-legend {
      flex-shrink: 0; margin-top: 8px;
      display: flex; flex-wrap: wrap; gap: 16px 16px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .legend-label { font-size: 12px; color: var(--white60); }

    /* ── Right panel: tasks ── */
    #tasks-panel {
      width: 280px; flex-shrink: 0;
      background: var(--bg-panel);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .tasks-header {
      padding: 16px 8px 8px 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .tasks-header .material-icons { font-size: 20px; color: var(--white54); }
    .tasks-header-title {
      flex: 1; font-size: 16px; font-weight: 700;
      letter-spacing: .8px; color: var(--white70);
    }

    .tasks-list {
      flex: 1; overflow-y: auto; padding: 8px 0;
      scrollbar-width: thin; scrollbar-color: var(--white24) transparent;
    }
    .tasks-list::-webkit-scrollbar { width: 4px; }
    .tasks-list::-webkit-scrollbar-thumb { background: var(--white24); border-radius: 2px; }

    .tasks-empty {
      height: 100%; display: flex; align-items: center; justify-content: center;
      color: var(--white38); font-size: 15px;
    }

    .task-group-label {
      padding: 10px 16px 4px;
      font-size: 12px; font-weight: 700; letter-spacing: .6px;
      color: var(--white38);
    }

    .task-tile {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px;
      cursor: pointer;
      transition: background .1s;
    }
    .task-tile:hover { background: var(--white10); }
    .task-check {
      width: 28px; height: 28px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--white38);
      background: none; border: none; cursor: pointer;
      border-radius: 50%;
    }
    .task-check .material-icons { font-size: 20px; }
    .task-check:hover { color: var(--accent); background: var(--accent-15); }
    .task-info { flex: 1; min-width: 0; }
    .task-title {
      font-size: 14px; color: var(--white);
    }
    .task-title.completing {
      color: var(--white38); text-decoration: line-through;
    }
    .task-notes {
      font-size: 12px; color: var(--white38);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .task-due { font-size: 12px; color: var(--white38); }
    .task-due.overdue { color: var(--red); font-weight: 700; }

    /* ── Icon buttons ── */
    .icon-btn {
      background: none; border: none;
      color: var(--white38); cursor: pointer;
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-family: 'Roboto', sans-serif;
      transition: background .1s, color .1s;
    }
    .icon-btn:hover { background: var(--white10); color: var(--white70); }
    .icon-btn.accent { color: var(--accent); }
    .icon-btn.accent:hover { background: var(--accent-15); }
    .icon-btn .material-icons { font-size: 18px; }

    .text-btn {
      background: none; border: none;
      color: var(--accent); cursor: pointer;
      padding: 4px 10px; border-radius: 4px;
      font-size: 14px; font-family: 'Roboto', sans-serif;
      transition: background .1s;
    }
    .text-btn:hover { background: var(--accent-15); }

    /* ── Modals (bottom sheet style) ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } }

    .modal-sheet {
      background: var(--bg-sheet);
      border-radius: 16px 16px 0 0;
      padding: 16px 20px 24px;
      width: 100%; max-width: 600px;
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--white24); border-radius: 2px;
      margin: 0 auto 16px;
    }
    .modal-title {
      font-size: 20px; font-weight: 700;
      margin-bottom: 12px;
    }
    .modal-no-events {
      padding: 16px 0;
      color: var(--white38); font-size: 15px;
    }
    .modal-events { max-height: 280px; overflow-y: auto; }
    .modal-event-item {
      display: flex; gap: 12px;
      padding: 6px 0;
    }
    .modal-event-bar {
      width: 4px; min-height: 42px; flex-shrink: 0;
      border-radius: 2px;
    }
    .modal-event-info { flex: 1; }
    .modal-event-title { font-size: 15px; font-weight: 500; }
    .modal-event-time { font-size: 13px; color: var(--white54); }

    /* Add task form */
    .task-form { display: flex; flex-direction: column; gap: 16px; }
    .task-form-title { font-size: 18px; font-weight: 700; }
    .form-select, .form-input {
      width: 100%; padding: 12px 14px;
      background: transparent; color: var(--white);
      border: 1px solid var(--divider); border-radius: 8px;
      font-size: 15px; font-family: 'Roboto', sans-serif;
      outline: none;
      transition: border-color .15s;
    }
    .form-select option { background: var(--bg-sheet); }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--white38); }
    .submit-btn {
      width: 100%; padding: 14px;
      background: var(--accent); color: var(--white);
      border: none; border-radius: 8px;
      font-size: 15px; font-family: 'Roboto', sans-serif;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity .15s;
    }
    .submit-btn:hover { opacity: .85; }
    .submit-btn:disabled { opacity: .5; cursor: default; }

    /* ── Refresh indicator (near clock) ── */
    #refresh-indicator {
      position: absolute; top: 14px; left: 222px;
      z-index: 10;
    }

    /* ══════════════════════════════════════════════════════════════════
       RESPONSIVE — phone portrait (< 768px)
       Stacks the three panels vertically and lets the page scroll.
    ══════════════════════════════════════════════════════════════════ */
    @media (max-width: 767px) {

      /* Let the whole page scroll */
      html, body {
        height: auto;
        min-height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
      }

      /* Dashboard: vertical stack, part of document flow */
      #dashboard {
        position: relative;
        flex-direction: column;
        height: auto;
        min-height: 100svh; /* fallback to 100vh in older browsers */
        overflow: visible;
      }

      /* ── Upcoming panel: compact strip at top ── */
      #upcoming-panel {
        width: 100%;
        max-height: 240px;
        border-bottom: 1px solid var(--divider);
        flex-shrink: 0;
      }

      /* Shrink the large clock to fit on a phone header */
      #clock-time {
        font-size: 34px;
        letter-spacing: 1px;
      }

      .clock-area {
        padding: 10px 8px 8px 14px;
      }

      /* Events list: capped so the panel doesn't eat the whole screen */
      .events-list {
        max-height: 165px;
      }

      /* ── Month panel: natural (auto) height, full width ── */
      #month-panel {
        width: 100%;
        flex: none;
        height: auto;
        overflow: visible;
        padding: 12px 10px;
      }

      #month-title { font-size: 18px; }

      /* Grid rows: fixed height instead of flex:1 (which needs a fixed parent) */
      .month-grid {
        flex: none;
        overflow: visible;
      }
      .month-row {
        flex: none;
        height: 52px;
      }

      /* Slightly smaller text and dots to fit 7 columns on a narrow screen */
      .day-num  { font-size: 12px; }
      .day-cell { padding-top: 3px; margin: 1px; }
      .event-dot { width: 5px; height: 5px; }
      .event-overflow { font-size: 8px; }

      .calendar-legend { gap: 8px 12px; margin-top: 6px; }
      .legend-label { font-size: 11px; }

      /* ── Tasks panel: natural height, full width, page scrolls ── */
      #tasks-panel {
        width: 100%;
        flex: none;
        height: auto;
        overflow: visible;
      }

      /* Tasks list expands to show all tasks; no internal scroll needed */
      .tasks-list {
        flex: none;
        height: auto;
        overflow: visible;
        /* bottom padding so last task clears iPhone home bar */
        padding-bottom: max(16px, env(safe-area-inset-bottom));
      }

      .tasks-empty {
        height: auto;
        padding: 24px 16px;
      }

      /* Refresh indicator: pin to top-right so it's always visible */
      #refresh-indicator {
        position: fixed;
        top: 12px;
        right: 12px;
        left: auto;
      }

      /* Modals: fill full width on narrow screens */
      .modal-sheet {
        max-width: 100%;
        padding-bottom: max(24px, env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>

<!-- Sign-in screen -->
<div id="signin-screen">
  <div class="signin-card">
    <span class="material-icons signin-icon">calendar_month</span>
    <h1>Family Calendar</h1>
    <p class="signin-subtitle">Dashboard</p>
    <p class="signin-error" id="signin-error"></p>
    <button id="signin-btn" onclick="App.signIn()">
      <span class="material-icons">login</span>
      Sign in with Google
    </button>
  </div>
</div>

<!-- First-load overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">

  <!-- Refresh indicator -->
  <div id="refresh-indicator" class="hidden">
    <div class="spinner-sm"></div>
  </div>

  <!-- Left: Upcoming Events (300px) -->
  <div id="upcoming-panel">
    <div class="clock-area">
      <div class="clock-info">
        <div id="clock-time">00:00</div>
        <div id="clock-date">Monday, January 1</div>
      </div>
      <div class="clock-actions">
        <button class="icon-btn" onclick="App.loadData()" title="Refresh">
          <span class="material-icons">refresh</span>
        </button>
        <button class="icon-btn" onclick="App.signOut()" title="Sign out">
          <span class="material-icons">logout</span>
        </button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="events-list" id="events-list">
    </div>
  </div>

  <!-- Center: Month View -->
  <div id="month-panel">
    <div class="month-header">
      <button class="icon-btn" onclick="App.prevMonth()">
        <span class="material-icons">chevron_left</span>
      </button>
      <span id="month-title"></span>
      <button class="text-btn" onclick="App.goToday()">Today</button>
      <button class="icon-btn" onclick="App.nextMonth()">
        <span class="material-icons">chevron_right</span>
      </button>
    </div>
    <div class="dow-header">
      <span>Mon</span><span>Tue</span><span>Wed</span>
      <span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
    </div>
    <div class="month-grid" id="month-grid"></div>
    <div class="calendar-legend" id="calendar-legend"></div>
  </div>

  <!-- Right: Tasks (280px) -->
  <div id="tasks-panel">
    <div class="tasks-header">
      <span class="material-icons">checklist</span>
      <span class="tasks-header-title">Tasks</span>
      <button class="icon-btn accent" onclick="App.showAddTask()" title="New task">
        <span class="material-icons">add</span>
      </button>
    </div>
    <div class="divider"></div>
    <div class="tasks-list" id="tasks-list"></div>
  </div>
</div>

<!-- Day detail modal -->
<div id="day-modal" class="modal-overlay hidden">
  <div class="modal-sheet" id="day-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="day-modal-title"></div>
    <div id="day-modal-events" class="modal-events"></div>
  </div>
</div>

<!-- Add task modal -->
<div id="task-modal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="task-form">
      <div class="task-form-title">New Task</div>
      <select id="task-list-select" class="form-select"></select>
      <input type="text" id="task-title-input" class="form-input"
             placeholder="Task title" autocomplete="off" />
      <button class="submit-btn" id="task-submit-btn" onclick="App.submitTask()">
        Add Task
      </button>
    </div>
  </div>
</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
</body>
</html>
